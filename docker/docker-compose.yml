services:

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: pdm-mlflow
    networks:
      - ml-net          # ← AGREGA
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      sh -c "mkdir -p /mlflow/artifacts /mlflow/db &&
      chmod -R 777 /mlflow &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts '*'"
    restart: unless-stopped

  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pdm-train
    networks:
      - ml-net          # ← AGREGA
    command: ["python", "pipelines/train_pipeline.py"]
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GIT_PYTHON_REFRESH=quiet
    depends_on:
      - mlflow
    volumes:
      - ../data:/app/data
      - mlflow-data:/mlflow
    restart: "no"
    profiles: ["train"]

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pdm-api
    networks:
      - ml-net          # ← AGREGA
    command: ["uvicorn", "src.serving.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - ../data:/app/data
      - mlflow-data:/mlflow
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pdm-prometheus
    networks:
      - ml-net          # ← AGREGA
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - api
    restart: unless-stopped

networks:
  ml-net:               # ← AGREGA al final
    driver: bridge

volumes:
  mlflow-data:
  prometheus_data: