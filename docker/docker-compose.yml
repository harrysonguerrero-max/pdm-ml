services:

  # ── 1. MLflow Tracking Server ──────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: pdm-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Training job — runs once, registers model, then exits ───────────────
  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pdm-train
    command: ["python", "pipelines/train_pipeline.py"]
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ../data:/app/data          # CSVs en data/raw + outputs en data/processed
      - mlflow-data:/mlflow        # artifacts compartidos con MLflow server
    # restart: no — es un job, no un servicio long-running
    restart: "no"

  # ── 3. Serving API — arranca solo después de que train termine ─────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pdm-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
      train:
        condition: service_completed_successfully  # espera que train termine OK
    volumes:
      - ../data:/app/data
      - mlflow-data:/mlflow

volumes:
  mlflow-data: