services:

  # ── 1. MLflow Tracking Server ─────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: pdm-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Training job — runs once, registers model, then exits ──────────────
  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pdm-train
    command: ["python", "pipelines/train_pipeline.py"]
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - mlflow-data:/mlflow
    restart: "no"

  # ── 3. Serving API — starts only after train completes successfully ────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pdm-api
    # Explicit command — makes it clear this container serves, not trains
    command: [
      "uvicorn", "src.serving.app:app",
      "--host", "0.0.0.0",
      "--port", "8000"
    ]
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
      train:
        condition: service_completed_successfully
    volumes:
      - ../data:/app/data
      - mlflow-data:/mlflow
    # Restart API if it crashes (model loading failure, OOM, etc.)
    restart: on-failure


  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pdm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mlflow-data:
  prometheus-data:
